<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz System</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
    margin: 0;
}

.quiz-container {
    background: white;
    width: 90%;
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    margin-bottom: 20px;
}

.option {
    display: block;
    margin: 10px 0;
    padding: 10px;
    background: #eee;
    border-radius: 5px;
    cursor: pointer;
}

.option:hover {
    background: #ddd;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}

#result {
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Question here</h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
    <p id="result"></p>
</div>

<script>
const quiz = [
    {
        question: "What is HTML?",
        options: ["Programming Language", "Markup Language", "Database", "Operating System"],
        answer: "Markup Language"
    },
    {
        question: "What is CSS used for?",
        options: ["Structure", "Styling", "Logic", "Database"],
        answer: "Styling"
    },
    {
        question: "Which is a JavaScript framework?",
        options: ["React", "HTML", "CSS", "MySQL"],
        answer: "React"
    }
];

let index = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[index];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(option => {
        const btn = document.createElement("div");
        btn.innerText = option;
        btn.classList.add("option");
        btn.onclick = () => checkAnswer(option);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selected) {
    if (selected === quiz[index].answer) {
        score++;
    }
}

function nextQuestion() {
    index++;
    if (index < quiz.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-container").innerHTML =
            "<h2>Quiz Completed</h2><p>Your Score: " + score + "/" + quiz.length + "</p>";
    }
}

loadQuestion();
</script>

</body>
</html>
