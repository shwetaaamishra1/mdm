<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Section Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Website</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section id="home">
        <h2>Home</h2>
        <p>Welcome to our website.</p>
    </section>

    <section id="about">
        <h2>About</h2>
        <p>This section describes the website.</p>
    </section>

    <section id="services">
        <h2>Services</h2>
        <p>We provide web development services.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </section>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
